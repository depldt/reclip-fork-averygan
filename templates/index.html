<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAMBEAR</title>
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTIiIGZpbGw9IiMwMDAiLz48dGV4dCB4PSI1MCUiIHk9IjU1JSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsLCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjMwIiBmb250LXdlaWdodD0iNzAwIiBmaWxsPSIjRDBGNkY3Ij5WQjwvdGV4dD48L3N2Zz4=" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Jura:wght@300;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --fg: #D0F6F7;
      --accent: #D0F6F7;
      --accent-hover: #a8e6e7;
      --muted: #6b8a8b;
      --card: #0a0a0a;
      --card-border: #1a2a2b;
      --success: #4ade80;
      --error: #f87171;
      --radius: 14px;
      --shimmer: linear-gradient(90deg, #0a0a0a 25%, #111 50%, #0a0a0a 75%);
      --logo-shift-x: -40px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      /* Жёсткое центрирование по обеим осям */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center; /* Фоллбэк для всех дочерних элементов */
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.06;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
      z-index: -1;
    }

    .shell {
      width: 100%;
      max-width: 620px;
      padding: 0 24px;
      margin: 0 auto;
    }

    .page {
      width: 100%;
      padding: 0 0 80px;
      /* Гарантируем центрирование содержимого по X */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 60px 0 48px;
    }
    .brand-inner {
      width: 100%;
      text-align: center;
    }
    .brand h1 {
      font-family: 'Jura', sans-serif;
      font-size: 102px;
      font-weight: 900;
      letter-spacing: 30px;
      line-height: 1;
      text-transform: uppercase;
      /* Градиентный текст */
      background: linear-gradient(to bottom, #D0F6F7 45%, #000000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: #D0F6F7; /* Fallback */
      display: inline-block;
      margin: 0; /* Центрируется через .brand-inner */
      transform: translateX(var(--logo-shift-x));
    }
    .brand h1 em { 
      font-style: normal; 
      -webkit-text-fill-color: transparent; 
      color: #D0F6F7;
    }
    .brand p {
      margin-top: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    textarea {
      width: 100%;
      max-width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      resize: none;
      min-height: 56px;
      transition: border-color 0.25s, box-shadow 0.25s;
      margin-bottom: 6px;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(208, 246, 247, 0.15);
    }
    textarea::placeholder { 
      color: var(--muted);
      font-weight: 500;
    }

    .hint {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
      font-weight: 500;
      width: 100%;
      text-align: left; /* Подсказка остаётся слева для читаемости */
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
      width: 100%;
      justify-content: center; /* Центрируем группу кнопок */
    }
    .pill-group {
      display: flex;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .pill {
      padding: 10px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pill.active { 
      background: var(--fg); 
      color: var(--bg); 
    }
    .pill:not(.active):hover { 
      color: var(--fg); 
    }

    .fetch-btn {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .fetch-btn:hover { 
      background: var(--accent-hover); 
    }
    .fetch-btn:active { 
      transform: scale(0.98); 
    }
    .fetch-btn:disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
      transform: none; 
    }

    /* Cards */
    .cards { 
      margin-top: 24px; 
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      display: flex;
      gap: 14px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
      width: 100%;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      width: 120px;
      min-width: 120px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-border);
      flex-shrink: 0;
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-thumb .no-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .card-thumb .no-thumb svg {
      width: 28px;
      height: 28px;
      opacity: 0.5;
    }

    .card-thumb.loading {
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 6px;
    }
    .skeleton-line.short { width: 40%; height: 10px; }
    .skeleton-line.medium { width: 75%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.15rem;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }
    .card-meta {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-dl-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 7px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .card-dl-btn:hover { 
      background: var(--accent-hover); 
    }
    .card-dl-btn:disabled { 
      opacity: 0.4; 
      cursor: not-allowed; 
    }
    .card-dl-btn.done { 
      background: var(--success); 
      color: #000; 
    }
    .card-dl-btn.error { 
      background: var(--error); 
      color: #000; 
    }

    .card-status {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }
    .card-status.downloading { 
      color: var(--accent); 
    }
    .card-status.done { 
      color: var(--success); 
    }
    .card-status.error { 
      color: var(--error); 
    }

    .q-chip {
      padding: 6px 12px;
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-chip.active {
      border-color: var(--fg);
      color: var(--fg);
      background: rgba(208, 246, 247, 0.1);
    }
    .q-chip:hover:not(.active) { 
      border-color: var(--muted); 
    }

    /* Error card */
    .card.card-error {
      border-color: rgba(248, 113, 113, 0.3);
      background: rgba(248, 113, 113, 0.08);
    }
    .card-error-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(248, 113, 113, 0.15);
      color: var(--error);
    }
    .card-error-icon svg {
      width: 24px;
      height: 24px;
    }
    .card-error-msg {
      font-size: 0.9rem;
      color: var(--error);
      margin-top: 2px;
      line-height: 1.4;
      font-weight: 500;
    }
    .card-error-url {
      font-size: 0.8rem;
      color: var(--muted);
      word-break: break-all;
      margin-top: 4px;
      font-weight: 500;
    }

    /* Download all bar */
    .dl-all-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      width: 100%;
    }
    .dl-all-btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dl-all-btn:hover { 
      background: var(--accent-hover); 
    }
    .dl-all-btn:disabled { 
      opacity: 0.4; 
      cursor: not-allowed; 
    }

    .spin {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 2;
      font-weight: 500;
      width: 100%;
    }

    /* Mobile */
    @media (max-width: 500px) {
      .brand h1 { 
        font-size: 64px; 
        letter-spacing: 15px;
        transform: none;
      }
      .brand p {
        font-size: 0.95rem;
      }
      .shell {
        padding: 0 16px;
      }
      .brand {
        margin-top: 40px;
      }
      .page { 
        padding: 0 0 60px; 
      }
      .card { flex-direction: column; gap: 10px; }
      .card-thumb {
        width: 100%;
        min-width: unset;
        height: 160px;
      }
      .card-title { white-space: normal; }
      .controls { flex-wrap: wrap; justify-content: center; }
      .fetch-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
  <div class="brand">
    <div class="brand-inner">
      <h1>VAMBEAR</h1>
      <p>Kostenloser Medien-Downloader</p>
    </div>
  </div>

  <div class="page">

    <textarea id="urls" placeholder="Fügen Sie eine oder mehrere URLs ein..." rows="2"></textarea>
    <p class="hint">Mehrere Links? Durch Leerzeichen, Kommas oder Zeilenumbrüche trennen.</p>

    <div class="controls">
      <div class="pill-group">
        <button class="pill active" data-format="video" onclick="setFormat(this)">MP4</button>
        <button class="pill" data-format="audio" onclick="setFormat(this)">MP3</button>
      </div>
      <button class="fetch-btn" id="goBtn" onclick="go()">LAUFEN</button>
    </div>

    <div id="cards" class="cards"></div>

    <div class="footer">
      YouTube &middot; TikTok &middot; Instagram &middot; Twitter/X &middot; Reddit &middot; Facebook<br>
      Vimeo &middot; Twitch &middot; Dailymotion &middot; SoundCloud &middot; Loom &middot; Streamable<br>
      Pinterest &middot; Tumblr &middot; Threads &middot; LinkedIn &middot; 1000+ more
    </div>
  </div>
  </div>

  <script>
    let currentFormat = 'video';
    let cardData = [];

    function setFormat(btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.format;
    }

    function parseUrls(text) {
      return [...new Set(text.split(/[\s,]+/).map(u => u.trim()).filter(u => u.startsWith('http')))];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function friendlyError(err) {
      if (err.includes('Unsupported URL')) return 'This URL is not supported';
      if (err.includes('Video unavailable')) return 'Video is unavailable or private';
      if (err.includes('Private video')) return 'This video is private';
      if (err.includes('HTTP Error 403')) return 'Access denied by the platform';
      if (err.includes('HTTP Error 404')) return 'Video not found';
      if (err.includes('copyright')) return 'Video blocked due to copyright';
      if (err.includes('geo')) return 'Video not available in your region';
      if (err.includes('timed out') || err.includes('Timed out')) return 'Request timed out — try again';
      if (err.includes('network') || err.includes('Network')) return 'Network error — check your connection';
      return err.length > 80 ? err.slice(0, 80) + '...' : err;
    }

    document.getElementById('urls').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });

    async function go() {
      const urls = parseUrls(document.getElementById('urls').value);
      if (!urls.length) return;

      const btn = document.getElementById('goBtn');
      const container = document.getElementById('cards');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      container.innerHTML = '';
      cardData = [];

      for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);

        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
          } else {
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.title || '',
              thumbnail: data.thumbnail || '',
              duration: data.duration,
              uploader: data.uploader || '',
              formats: data.formats || [],
              selectedFormatId: data.formats?.[0]?.id || null,
            };
          }
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
        }
        renderCard(idx);
      }

      if (cardData.filter(c => c.status === 'ready').length > 1) {
        renderDownloadAll();
      }

      btn.disabled = false;
      btn.textContent = 'Fetch';
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      // Loading skeleton
      if (c.status === 'loading') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
          </div>
        `;
        return;
      }

      // Error state
      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" style="color:var(--error)">Could not fetch video</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      // Ready / downloading / done / error states
      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      }

      let qualityChips = '';
      if (!isAudio && c.formats && c.formats.length > 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      if (c.status === 'ready') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Download</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        actionHtml = `<span class="card-status downloading"><span class="spin"></span> Downloading...</span>`;
      } else if (c.status === 'done') {
        actionHtml = `<button class="card-dl-btn done" onclick="saveCard(${idx})">Save</button>
          <span class="card-status done">${esc(c.filename || '')}</span>`;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Retry</button>
          <span class="card-status error">${esc(friendlyError(c.error || 'Download failed'))}</span>`;
      }

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(c.title || 'Untitled')}</div>
          <div class="card-meta">${esc(c.uploader)}${c.duration ? ' · ' + fmtDur(c.duration) : ''}</div>
          <div class="card-actions">${actionHtml}</div>
        </div>
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">Download All</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
          }),
        });
        const data = await res.json();
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${c.jobId}`);
          const data = await res.json();
          if (data.status === 'done') {
            clearInterval(iv);
            c.status = 'done';
            c.filename = data.filename;
            renderCard(idx);
            saveCard(idx);
          } else if (data.status === 'error') {
            clearInterval(iv);
            c.status = 'error';
            c.error = data.error;
            renderCard(idx);
          }
        } catch {
          clearInterval(iv);
          c.status = 'error';
          c.error = 'Lost connection to server';
          renderCard(idx);
        }
      }, 1000);
    }

    function saveCard(idx) {
      const c = cardData[idx];
      if (!c.jobId) return;
      const a = document.createElement('a');
      a.href = `/api/file/${c.jobId}`;
      a.download = c.filename || '';
      a.click();
    }

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Downloading...'; }

      for (let i = 0; i < cardData.length; i++) {
        if (cardData[i].status === 'ready') {
          await dlCard(i);
        }
      }

      if (btn) { btn.disabled = false; btn.textContent = 'Download All'; }
    }
  </script>
</body>
</html>
